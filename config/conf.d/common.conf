# Demyx
# https://demyx.sh

### common directives and settings

index index.html index.php;
proxy_buffers 8 32k;
proxy_buffer_size 64k;

# -------------------------------------------------------------------

# for time-consuming operations (such as WP import or file upload)
# https://nginx.org/r/fastcgi_read_timeout
# default 60 seconds
fastcgi_read_timeout 5m;

# -------------------------------------------------------------------

### To enable large uploads
# Please make sure the corresponding PHP values are increased as well
# post_max_size = 8M (default)
# upload_max_filesize = 2M (default)

client_max_body_size DEMYX_UPLOAD_LIMIT;

# -------------------------------------------------------------------

### To fix the error - could not build the server_names_hash
# ref: https://nginx.org/en/docs/hash.html
server_names_hash_bucket_size 128;

# -------------------------------------------------------------------

# Main log
log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" "$http_x_forwarded_for"';

# for extended metrics (in Amplify, etc)
log_format  main_ext  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      '"$host" sn="$server_name" '
                      'rt=$request_time '
                      'ua="$upstream_addr" us="$upstream_status" '
                      'ut="$upstream_response_time" ul="$upstream_response_length" '
                      'cs=$upstream_cache_status' ;

# -------------------------------------------------------------------

### Fine-tune logging
# ref: https://nginx.org/r/access_log
map $status $loggable {
    ~^[23]  0;
    default 1;
}

# -------------------------------------------------------------------

# https://jdh8.github.io/charset-for-text-on-nginx/
map $sent_http_content_type $charset {
    ~^text/   utf-8;
}

charset       $charset;
charset_types *;

# -------------------------------------------------------------------

# webp support
# see: https://docs.ewww.io/article/16-ewww-io-and-webp-images

map $http_accept $webp_suffix {
  default "";
  "~*webp" ".webp";
}

# -------------------------------------------------------------------

limit_req_zone $request_uri zone=common:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=ip:10m rate=1r/s;
limit_req_zone $server_name zone=server:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# -------------------------------------------------------------------

client_body_temp_path DEMYX_CONFIG/nginx-client 1 2;
fastcgi_temp_path DEMYX_CONFIG/nginx-fastcgi 1 2;
proxy_temp_path DEMYX_CONFIG/nginx-proxy;
uwsgi_temp_path DEMYX_CONFIG/nginx-uwsgi;
scgi_temp_path DEMYX_CONFIG/nginx-scgi;

# -------------------------------------------------------------------

resolver 1.1.1.1 1.0.0.1 valid=300s;
resolver_timeout 10;
